name: CI
on:
  pull_request:
    branches: [main]
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bunx tsc --noEmit
      - run: bunx biome check .
      - run: bun test
      - name: Version sync check
        run: bun run scripts/check-version-sync.js
