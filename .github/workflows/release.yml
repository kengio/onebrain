name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ─── Step 1: verify tag matches package.json version ──────────────────────
  verify-tag:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
      release_date: ${{ steps.check.outputs.release_date }}
    steps:
      - uses: actions/checkout@v4

      - name: Check tag matches package.json version
        id: check
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # Strip leading 'v'
          TAG_VERSION="${TAG#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")

          echo "Tag version:  $TAG_VERSION"
          echo "package.json: $PKG_VERSION"

          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi

          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

  # ─── Step 2: build binaries (6 targets in parallel) ───────────────────────
  build-binaries:
    needs: verify-tag
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-darwin-arm64
            output: onebrain-darwin-arm64
            ext: ""
          - target: bun-darwin-x64
            output: onebrain-darwin-x64
            ext: ""
          - target: bun-linux-arm64
            output: onebrain-linux-arm64
            ext: ""
          - target: bun-linux-x64
            output: onebrain-linux-x64
            ext: ""
          - target: bun-linux-arm64-musl
            output: onebrain-linux-arm64-musl
            ext: ""
          - target: bun-linux-x64-musl
            output: onebrain-linux-x64-musl
            ext: ""
          - target: bun-windows-x64
            output: onebrain-windows-x64
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2"

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Build binary
        env:
          VERSION: ${{ needs.verify-tag.outputs.version }}
          RELEASE_DATE: ${{ needs.verify-tag.outputs.release_date }}
          TARGET: ${{ matrix.target }}
          OUTFILE: ${{ matrix.output }}${{ matrix.ext }}
        run: |
          bun build --compile \
            --target="$TARGET" \
            --define BUILD_VERSION="\"$VERSION\"" \
            --define BUILD_DATE="\"$RELEASE_DATE\"" \
            src/index.ts \
            --outfile "$OUTFILE"

          echo "Built: $OUTFILE ($(du -sh "$OUTFILE" | cut -f1))"

      - name: Generate checksum
        env:
          OUTPUT: ${{ matrix.output }}
          EXT: ${{ matrix.ext }}
        run: |
          sha256sum "${OUTPUT}${EXT}" > "${OUTPUT}.sha256"
          cat "${OUTPUT}.sha256"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.output }}
          path: |
            ${{ matrix.output }}${{ matrix.ext }}
            ${{ matrix.output }}.sha256

  # ─── Step 3: package plugin ZIP ───────────────────────────────────────────
  package-plugin:
    needs: verify-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package plugin ZIP
        env:
          VERSION: ${{ needs.verify-tag.outputs.version }}
        run: |
          ZIP_NAME="onebrain-plugin-v${VERSION}.zip"
          zip -r "$ZIP_NAME" \
            .claude/plugins/onebrain/
          echo "Packaged: $ZIP_NAME ($(du -sh "$ZIP_NAME" | cut -f1))"

      - name: Generate checksum
        env:
          VERSION: ${{ needs.verify-tag.outputs.version }}
        run: |
          sha256sum "onebrain-plugin-v${VERSION}.zip" > "onebrain-plugin-v${VERSION}.sha256"
          cat "onebrain-plugin-v${VERSION}.sha256"

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-zip
          path: |
            onebrain-plugin-v${{ needs.verify-tag.outputs.version }}.zip
            onebrain-plugin-v${{ needs.verify-tag.outputs.version }}.sha256

  # ─── Step 4: create GitHub release ──────────────────────────────────────
  create-release:
    needs: [verify-tag, build-binaries, package-plugin]
    runs-on: ubuntu-latest
    if: ${{ always() && needs.build-binaries.result == 'success' && needs.package-plugin.result == 'success' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Extract CHANGELOG entry
        id: changelog
        env:
          VERSION: ${{ needs.verify-tag.outputs.version }}
        run: |
          # Extract section for this version: ## v2.0.8 — title
          NOTES=$(awk -v ver="$VERSION" 'BEGIN{pat="^## v?" ver} $0~pat{found=1;next} found && /^## /{exit} found{print}' CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](CHANGELOG.md) for details."
          fi
          echo "$NOTES" > release_notes.txt
          echo "Extracted $(wc -l < release_notes.txt) lines from CHANGELOG.md"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.verify-tag.outputs.version }}
        run: |
          ASSETS=()
          for target in darwin-arm64 darwin-x64 linux-arm64 linux-x64 linux-arm64-musl linux-x64-musl; do
            ASSETS+=("onebrain-${target}")
            ASSETS+=("onebrain-${target}.sha256")
          done
          for target in windows-x64; do
            ASSETS+=("onebrain-${target}.exe")
            ASSETS+=("onebrain-${target}.sha256")
          done
          ASSETS+=("onebrain-plugin-v${VERSION}.zip")
          ASSETS+=("onebrain-plugin-v${VERSION}.sha256")

          FILE_ARGS=()
          for asset in "${ASSETS[@]}"; do
            if [ -f "$asset" ]; then
              FILE_ARGS+=("$asset")
            else
              echo "::warning::Asset not found: $asset"
            fi
          done

          gh release create "v${VERSION}" \
            --title "OneBrain v${VERSION}" \
            --notes-file release_notes.txt \
            "${FILE_ARGS[@]}"

  # ─── Step 5: npm publish (after release so postinstall can download binaries)
  npm-publish:
    needs: [verify-tag, create-release]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2"

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Build postinstall script
        run: bun build src/scripts/postinstall.ts --outfile dist/postinstall.js --target node

      - name: Compile TypeScript bundle (fallback for unsupported platforms)
        env:
          VERSION: ${{ needs.verify-tag.outputs.version }}
          RELEASE_DATE: ${{ needs.verify-tag.outputs.release_date }}
        run: |
          bun build src/index.ts --outfile dist/onebrain --target bun \
            --define BUILD_VERSION="\"$VERSION\"" \
            --define BUILD_DATE="\"$RELEASE_DATE\""

      - name: Publish to npm
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> ~/.npmrc
          npm publish --access public

  # ─── Step 6: trigger website rebuild so v{cliVersion} stays in sync ──────
  # Gated on npm-publish.result=='success' because npm-publish has
  # continue-on-error: true (so `needs:` alone treats a failed publish as success).
  trigger-website:
    needs: [verify-tag, npm-publish]
    if: needs.npm-publish.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger Cloudflare deploy hook
        env:
          DEPLOY_HOOK_URL: ${{ secrets.CF_WEBSITE_DEPLOY_HOOK }}
          VERSION: ${{ needs.verify-tag.outputs.version }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            if [ "${GITHUB_REPOSITORY}" = "onebrain-ai/onebrain" ]; then
              echo "::error::CF_WEBSITE_DEPLOY_HOOK secret is required on the canonical repo"
              exit 1
            fi
            echo "::warning::Skipping website rebuild on fork ${GITHUB_REPOSITORY} — secret not set"
            exit 0
          fi

          echo "Triggering website rebuild for v${VERSION}..."
          CURL_EXIT=0
          HTTP_CODE=$(curl -X POST "$DEPLOY_HOOK_URL" \
            -sS \
            -o response.txt \
            -w "%{http_code}" \
            --connect-timeout 10 \
            --max-time 30 \
            --retry 3 --retry-delay 5 --retry-all-errors) || CURL_EXIT=$?

          if [ "$CURL_EXIT" -ne 0 ]; then
            echo "::error::curl failed (exit ${CURL_EXIT}) — network/DNS/TLS issue, not an HTTP error"
            exit 1
          fi

          if ! [[ "$HTTP_CODE" =~ ^[0-9]+$ ]]; then
            echo "::error::Unexpected HTTP code value: '$HTTP_CODE'"
            exit 1
          fi

          # Bound body output to avoid huge HTML error pages flooding logs
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Website rebuild triggered (HTTP $HTTP_CODE) — should be live within 1-2 min"
            [ -f response.txt ] && head -c 2000 response.txt || echo "(no response body)"
          else
            echo "::error::Deploy hook returned HTTP $HTTP_CODE"
            [ -f response.txt ] && head -c 2000 response.txt || echo "(no response body)"
            exit 1
          fi
